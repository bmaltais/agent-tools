name: registry-ci

on:
  pull_request:
    paths:
      - tools/**
      - cmd/**
      - .github/workflows/registry-ci.yml
  push:
    branches:
      - main
    paths:
      - tools/**
      - cmd/**
      - .github/workflows/registry-ci.yml

jobs:
  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install validator dependency
        run: pip install jsonschema

      - name: Validate registry schema and binary links
        run: python scripts/validate_registry.py
